name: Publish All Agents

on:
  push:
    branches: [ main, master ]
    paths:
      - 'ubuntu/**'
      - 'github/**'
      - '.github/workflows/publish-*.yml'
  release:
    types: [published]

env:
  REGISTRY: ghcr.io

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Ubuntu metadata
        id: ubuntu-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/ubuntu-agent
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Ubuntu Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ubuntu
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.ubuntu-meta.outputs.tags }}
          labels: ${{ steps.ubuntu-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-github:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract GitHub metadata
        id: github-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/github-agent
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push GitHub Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./github
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.github-meta.outputs.tags }}
          labels: ${{ steps.github-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  generate-sbom:
    needs: [build-ubuntu, build-github]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Ubuntu SBOM
        uses: anchore/sbom-action@v0
        with:
          image-digest: ${{ env.REGISTRY }}/${{ github.repository }}/ubuntu-agent@${{ steps.ubuntu-meta.outputs.digest }}
          output-file: ubuntu-sbom.spdx.json
          output-format: spdx-json

      - name: Generate GitHub SBOM
        uses: anchore/sbom-action@v0
        with:
          image-digest: ${{ env.REGISTRY }}/${{ github.repository }}/github-agent@${{ steps.github-meta.outputs.digest }}
          output-file: github-sbom.spdx.json
          output-format: spdx-json

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: |
            ubuntu-sbom.spdx.json
            github-sbom.spdx.json