services:
  githubRunner1:
    image: ghcr.io/lancer1977/dockeragent/github-agent:latest
    container_name: github-runner1
    restart: unless-stopped
    user: "1000:1000"
    environment:
      TZ: US/Eastern
      GITHUB_URL: ${GITHUB_URL:?GITHUB_URL is required}
      GITHUB_TOKEN: ${GITHUB_ORG_TOKEN:?GITHUB_ORG_TOKEN is required}
      GITHUB_RUNNER_NAME: github-runner-1
      GITHUB_RUNNER_POOL: ${GITHUB_RUNNER_POOL:-Default}
      GHCR_USERNAME: ${GHCR_USERNAME}
      GHCR_TOKEN: ${GHCR_TOKEN}
      GITHUB_PACKAGES_TOKEN: ${GITHUB_PACKAGES_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/lancer1977/servers/github-runner1/.ssh:/home/runneruser/.ssh:ro
      - github-runner1-work:/actions-runner/_work
    networks:
      - github-runner-network

  githubRunner2:
    image: ghcr.io/lancer1977/dockeragent/github-agent:latest
    container_name: github-runner2
    restart: unless-stopped
    user: "1000:1000"
    environment:
      TZ: US/Eastern
      GITHUB_URL: ${GITHUB_URL:?GITHUB_URL is required}
      GITHUB_TOKEN: ${GITHUB_ORG_TOKEN:?GITHUB_ORG_TOKEN is required}
      GITHUB_RUNNER_NAME: github-runner-2
      GITHUB_RUNNER_POOL: ${GITHUB_RUNNER_POOL:-Default}
      GHCR_USERNAME: ${GHCR_USERNAME}
      GHCR_TOKEN: ${GHCR_TOKEN}
      GITHUB_PACKAGES_TOKEN: ${GITHUB_PACKAGES_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/lancer1977/servers/github-runner2/.ssh:/home/runneruser/.ssh:ro
      - github-runner2-work:/actions-runner/_work
    networks:
      - github-runner-network

volumes:
  github-runner1-work:
  github-runner2-work:

networks:
  github-runner-network:
    driver: bridge