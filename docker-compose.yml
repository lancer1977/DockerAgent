version: "3.8"

# Unified Docker Agent - supports GitHub Actions and Azure DevOps
# Works for both standalone (docker-compose up) and Swarm (docker stack deploy)
#
# Standalone: docker-compose up -d
# Swarm:      docker stack deploy -c docker-compose.yml -c docker-compose.swarm.yml docker-agents
#
# Build: docker build -t lancer1977/dockeragent:latest .
# Render env from Bitwarden: ./render-env-from-bitwarden.sh

services:
  github-runner:
    image: ${DOCKER_REGISTRY:-lancer1977}/dockeragent:${VERSION:-latest}
    container_name: github-runner
    env_file:
      - ${DOCKERAGENT_ENV_FILE:-.env.runtime}
    environment:
      - RUNNER_TYPE=github
      - TZ=${TZ:-America/New_York}
    volumes:
      - github-runner-data:/actions-runner
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - agents

  azure-runner:
    image: ${DOCKER_REGISTRY:-lancer1977}/dockeragent:${VERSION:-latest}
    container_name: azure-runner
    env_file:
      - ${DOCKERAGENT_ENV_FILE:-.env.runtime}
    environment:
      - RUNNER_TYPE=azure
      - TZ=${TZ:-America/New_York}
    volumes:
      - azure-runner-data:/azp
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - agents

networks:
  agents:
    driver: bridge

volumes:
  github-runner-data:
  azure-runner-data: